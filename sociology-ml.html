    <script>
        // Global download fix for cross-origin Supabase links
        document.addEventListener('click', async (e) => {
            const a = e.target.closest('a[download]');
            if (a && a.href.includes('supabase.co')) {
                e.preventDefault();
                const originalText = a.innerText;
                a.innerText = 'Downloading...';
                try {
                    const response = await fetch(a.href);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const tempA = document.createElement('a');
                    tempA.href = url;
                    tempA.download = a.getAttribute('download') || 'file.pdf';
                    document.body.appendChild(tempA);
                    tempA.click();
                    document.body.removeChild(tempA);
                    window.URL.revokeObjectURL(url);
                } catch (err) {
                    console.error('Download failed', err);
                    // Fallback to opening in new tab if fetch fails (e.g. CORS)
                    window.open(a.href, '_blank');
                } finally {
                    a.innerText = originalText;
                }
            }
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAc1eNCmAYDRYbnRZPWj8NQ7dOWJY-4d0o",
            authDomain: "academic-portal-135fd.firebaseapp.com",
            projectId: "academic-portal-135fd",
            storageBucket: "academic-portal-135fd.firebasestorage.app",
            messagingSenderId: "459730360375",
            appId: "1:459730360375:web:151a615ff0bc30557347b2",
            databaseURL: "https://academic-portal-135fd-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const onlineRef = ref(db, 'online_users');
        const connectedRef = ref(db, '.info/connected');

        let userId = localStorage.getItem('portal-userId');
        if (!userId) {
            userId = 'u_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('portal-userId', userId);
        }

        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                const myPresenceRef = ref(db, `online_users/${userId}`);
                set(myPresenceRef, {
                    lastActive: serverTimestamp(),
                    name: localStorage.getItem('portal-username') || 'Anonymous',
                    userId: userId
                });
                onDisconnect(myPresenceRef).remove();
                setInterval(() => {
                    set(myPresenceRef, {
                        lastActive: serverTimestamp(),
                        name: localStorage.getItem('portal-username') || 'Anonymous',
                        userId: userId
                    });
                }, 30000);
            }
        });

        const onlineCountElement = document.getElementById('online-count');
        if (onlineCountElement) {
            onValue(onlineRef, (snapshot) => {
                const now = Date.now();
                const users = snapshot.val() || {};
                let activeCount = 0;
                Object.values(users).forEach(u => {
                    if (u.lastActive && (now - u.lastActive < 60000)) activeCount++;
                });
                onlineCountElement.innerText = Math.max(1, activeCount);
            });
        }
    </script>
