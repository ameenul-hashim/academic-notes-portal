<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History of Keralam upto 12th Century - Languages</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Glassmorphism utility classes */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* Glass button styling */
        .btn-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Theme variables */
        :root {
            --bg-light: linear-gradient(to bottom right, #f0f5ff, #e0eaff);
            --bg-dark: linear-gradient(to bottom right, #1a1a2e, #16213e);
            --bg-emerald: linear-gradient(to bottom right, #e0f7e9, #c2efd9);
            --text-light: #212529;
            --text-dark: #f8f9fa;
            --text-emerald: #0a3b1c;
            --card-bg-light: rgba(255,255,255,0.6);
            --card-bg-dark: rgba(0,0,0,0.3);
            --card-bg-emerald: rgba(255,255,255,0.5);
            --card-border-light: rgba(0,0,0,0.1);
            --card-border-dark: rgba(255,255,255,0.1);
            --card-border-emerald: rgba(6,78,59,0.2);
        }

        /* Theme rules applying to html and body */
        html[data-theme="light"], body[data-theme="light"] {
            background: var(--bg-light) !important;
            color: var(--text-light) !important;
        }
        html[data-theme="dark"], body[data-theme="dark"] {
            background: var(--bg-dark) !important;
            color: var(--text-dark) !important;
        }
        html[data-theme="emerald"], body[data-theme="emerald"] {
            background: var(--bg-emerald) !important;
            color: var(--text-emerald) !important;
        }
        
        [data-theme="light"] .glass-card { background: var(--card-bg-light) !important; border-color: var(--card-border-light) !important; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important; }
        [data-theme="dark"] .glass-card { background: var(--card-bg-dark) !important; border-color: var(--card-border-dark) !important; }
        [data-theme="emerald"] .glass-card { background: var(--card-bg-emerald) !important; border-color: var(--card-border-emerald) !important; box-shadow: 0 4px 6px -1px rgba(6, 78, 59, 0.05) !important; }

        /* Text Color Overrides for Tailwind classes */
        [data-theme="light"] .text-white, [data-theme="light"] .text-gray-100, [data-theme="light"] .text-gray-200, [data-theme="light"] .text-gray-300 {
            color: var(--text-light) !important;
        }
        [data-theme="emerald"] .text-white, [data-theme="emerald"] .text-gray-100, [data-theme="emerald"] .text-gray-200, [data-theme="emerald"] .text-gray-300 {
            color: var(--text-emerald) !important;
        }
        
        /* Accent colors to adapt to themes */
        [data-theme="light"] .text-orange-200, [data-theme="light"] .text-pink-200, [data-theme="light"] .text-orange-300, [data-theme="light"] .text-pink-300 {
            color: #b45309 !important; /* amber-700 */
        }
        [data-theme="emerald"] .text-orange-200, [data-theme="emerald"] .text-pink-200, [data-theme="emerald"] .text-orange-300, [data-theme="emerald"] .text-pink-300 {
            color: #047857 !important; /* emerald-700 */
        }

        /* Specific background overrides like bg-white/5 */
        [data-theme="light"] .bg-white\/5, [data-theme="light"] .bg-white\/10 { background-color: rgba(0,0,0,0.05) !important; }
        [data-theme="emerald"] .bg-white\/5, [data-theme="emerald"] .bg-white\/10 { background-color: rgba(6,78,59,0.05) !important; }

        /* Border overrides */
        [data-theme="light"] .border-white\/20, [data-theme="light"] .border-white\/10 { border-color: rgba(0,0,0,0.1) !important; }
        [data-theme="emerald"] .border-white\/20, [data-theme="emerald"] .border-white\/10 { border-color: rgba(6,78,59,0.1) !important; }

        /* Hover effects */
        [data-theme="light"] .hover\:text-white:hover { color: #000 !important; }
        [data-theme="emerald"] .hover\:text-white:hover { color: #022c22 !important; }

        /* Link colors */
        [data-theme="light"] a.text-orange-300 { color: #2563eb !important; }
        [data-theme="emerald"] a.text-orange-300 { color: #047857 !important; }
    </style>
    <script>
        // Apply theme early to avoid flash
        (function() {
            const savedTheme = localStorage.getItem('preferred-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body class="bg-gradient-to-br from-red-950 via-rose-900 to-red-900 min-h-screen text-white font-sans antialiased flex flex-col">

    <!-- Header Section -->
    <header class="glass-card sticky top-0 z-50 shadow-lg py-4 relative">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
            <!-- Back Button Navigation -->
            <a href="index.html" class="flex items-center text-orange-200 hover:text-white transition-colors">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back
            </a>
            <div class="absolute left-1/2 transform -translate-x-1/2 text-center hidden md:block">
                <p class="text-sm text-orange-200 tracking-widest uppercase mb-1">Subject</p>
                <h1 class="font-bold text-2xl tracking-wider text-white">History of Keralam upto 12th Century</h1>
            </div>
            <!-- Empty div to balance flexbox space -->
            <div class="w-20"></div>
        </div>
    </header>

    <!-- Mobile Subject Title -->
    <div class="md:hidden text-center mt-6 px-4">
        <h1 class="font-bold text-3xl tracking-wider text-white">History of Keralam upto 12th Century</h1>
    </div>

    <!-- Main Content Area: Level 2 - Languages -->
    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full flex flex-col items-center justify-center">
        
        <h2 class="text-2xl text-gray-200 mb-8 font-light">Select Language:</h2>

        <!-- Grid System: 1 col on mobile, 2 on tablet+ -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 w-full max-w-3xl">
            
            <!-- Language Card: Malayalam -->
            <a href="economics-ml.html" class="block outline-none">
                <div class="glass-card rounded-2xl p-10 flex flex-col items-center justify-center text-center transition-transform duration-300 hover:scale-105 hover:shadow-[0_0_25px_rgba(251,113,133,0.5)]">
                    <span class="text-5xl mb-4">അ</span>
                    <h2 class="text-3xl font-bold text-white">Malayalam</h2>
                </div>
            </a>

            <!-- Language Card: English -->
            <a href="economics-en.html" class="block outline-none">
                <div class="glass-card rounded-2xl p-10 flex flex-col items-center justify-center text-center transition-transform duration-300 hover:scale-105 hover:shadow-[0_0_25px_rgba(251,113,133,0.5)]">
                    <span class="text-5xl mb-4">A</span>
                    <h2 class="text-3xl font-bold text-white">English</h2>
                </div>
            </a>

        </div>
    </main>

    <!-- Footer -->
    <footer class="glass-card py-6 text-center text-gray-300 border-t-0 border-r-0 border-l-0 mt-auto">
        <p>&copy; 2026 Unofficial Notes Portal. Created by Hashim</p>
    </footer>

    <!-- Theme selector -->
    

    <script>
        (function() {
            const selector = document.getElementById('theme-selector');
            const savedTheme = localStorage.getItem('preferred-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (selector) {
                selector.value = savedTheme;
                selector.addEventListener('change', (e) => {
                    const theme = e.target.value;
                    document.documentElement.setAttribute('data-theme', theme);
                    localStorage.setItem('preferred-theme', theme);
                });
            }
        })();
    </script>
</body>
</html>
