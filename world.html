<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philosophy of Artificial Intelligence - Languages</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    
    <script>
        // Apply theme early to avoid flash
        (function() {
            const savedTheme = localStorage.getItem('preferred-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
        <style>
        /* Glassmorphism utility classes */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* Glass button styling */
        .btn-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Theme variables */
        :root {
            --bg-rose: linear-gradient(to bottom right, #450a0a, #881337, #7f1d1d);
            --bg-dark: linear-gradient(to bottom right, #0f172a, #1e293b);
            --bg-light: linear-gradient(to bottom right, #f8fafc, #e2e8f0);
            --bg-emerald: linear-gradient(to bottom right, #064e3b, #065f46);
            
            --text-rose: #fff1f2;
            --text-dark: #f8fafc;
            --text-light: #0f172a;
            --text-emerald: #ecfdf5;

            --accent-rose: #fecdd3;
            --accent-dark: #fde68a;
            --accent-light: #2563eb;
            --accent-emerald: #6ee7b7;

            --card-rose: rgba(255, 255, 255, 0.08);
            --card-dark: rgba(255, 255, 255, 0.05);
            --card-light: rgba(255, 255, 255, 0.7);
            --card-emerald: rgba(255, 255, 255, 0.05);
        }

        /* Base Theme Application */
        html[data-theme="rose"], body[data-theme="rose"] { background: var(--bg-rose) !important; color: var(--text-rose) !important; }
        html[data-theme="dark"], body[data-theme="dark"] { background: var(--bg-dark) !important; color: var(--text-dark) !important; }
        html[data-theme="light"], body[data-theme="light"] { background: var(--bg-light) !important; color: var(--text-light) !important; }
        html[data-theme="emerald"], body[data-theme="emerald"] { background: var(--bg-emerald) !important; color: var(--text-emerald) !important; }

        /* Card Styles */
        [data-theme="rose"] .glass-card { background: var(--card-rose) !important; border-color: rgba(255,255,255,0.2) !important; }
        [data-theme="dark"] .glass-card { background: var(--card-dark) !important; border-color: rgba(255,255,255,0.1) !important; }
        [data-theme="light"] .glass-card { background: var(--card-light) !important; border-color: rgba(0,0,0,0.1) !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important; }
        [data-theme="emerald"] .glass-card { background: var(--card-emerald) !important; border-color: rgba(255,255,255,0.1) !important; }

        /* Text Overrides for all themes */
        [data-theme="rose"] .text-white, [data-theme="rose"] .text-gray-100 { color: var(--text-rose) !important; }
        [data-theme="dark"] .text-white, [data-theme="dark"] .text-gray-100 { color: var(--text-dark) !important; }
        [data-theme="light"] .text-white, [data-theme="light"] .text-gray-100, [data-theme="light"] .text-gray-200, [data-theme="light"] .text-gray-300 { color: var(--text-light) !important; }
        [data-theme="emerald"] .text-white, [data-theme="emerald"] .text-gray-100 { color: var(--text-emerald) !important; }

        /* Accent Text (Welcome, Subject, etc.) */
        [data-theme="rose"] .text-orange-200, [data-theme="rose"] .text-pink-200 { color: var(--accent-rose) !important; }
        [data-theme="dark"] .text-orange-200, [data-theme="dark"] .text-pink-200 { color: var(--accent-dark) !important; }
        [data-theme="light"] .text-orange-200, [data-theme="light"] .text-pink-200 { color: var(--accent-light) !important; }
        [data-theme="emerald"] .text-orange-200, [data-theme="emerald"] .text-pink-200 { color: var(--accent-emerald) !important; }

        /* Subtitles and Gray Text */
        [data-theme="rose"] .text-gray-300, [data-theme="rose"] .text-gray-400 { color: #fda4af !important; }
        [data-theme="dark"] .text-gray-300, [data-theme="dark"] .text-gray-400 { color: #94a3b8 !important; }
        [data-theme="light"] .text-gray-300, [data-theme="light"] .text-gray-400, [data-theme="light"] .text-gray-500 { color: #475569 !important; }
        [data-theme="emerald"] .text-gray-300, [data-theme="emerald"] .text-gray-400 { color: #6ee7b7 !important; }

        /* Dropdown visibility fix */
        #theme-selector {
            color: white !important;
            background-color: rgba(0,0,0,0.3) !important;
        }
        #theme-selector option {
            background-color: #1a1a2e !important;
            color: white !important;
        }
        [data-theme="light"] #theme-selector {
            color: #0f172a !important;
            background-color: rgba(255,255,255,0.8) !important;
            border-color: rgba(0,0,0,0.2) !important;
        }
        [data-theme="light"] #theme-selector option {
            background-color: white !important;
            color: #0f172a !important;
        }
    
        /* Upload Status Badge Overrides */
        /* Red Badges (0 Uploaded) */
        [data-theme="light"] .bg-red-500\/20 { background-color: rgba(239, 68, 68, 0.15) !important; }
        [data-theme="light"] .text-red-300 { color: #b91c1c !important; border-color: rgba(185, 28, 28, 0.2) !important; }
        [data-theme="emerald"] .text-red-300 { color: #fca5a5 !important; }

        /* Yellow Badges (Partial) */
        [data-theme="light"] .bg-yellow-500\/20 { background-color: rgba(245, 158, 11, 0.15) !important; }
        [data-theme="light"] .text-yellow-300 { color: #b45309 !important; border-color: rgba(180, 83, 9, 0.2) !important; }
        [data-theme="rose"] .text-yellow-300 { color: #fde68a !important; }

        /* Green Badges (Complete) */
        [data-theme="light"] .bg-green-500\/20 { background-color: rgba(34, 197, 94, 0.15) !important; }
        [data-theme="light"] .text-green-300 { color: #15803d !important; border-color: rgba(21, 128, 61, 0.2) !important; }
</style>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('preferred-theme') || 'rose';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script></head>
<body class="bg-gradient-to-br from-red-950 via-rose-900 to-red-900 min-h-screen text-white font-sans antialiased flex flex-col">

    <!-- Header Section -->
    <header class="glass-card sticky top-0 z-50 shadow-lg py-4 relative">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
            <!-- Back Button Navigation -->
            <a href="index.html" class="flex items-center text-orange-200 hover:text-white transition-colors">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back
            </a>
            <div class="absolute left-1/2 transform -translate-x-1/2 text-center hidden md:block">
                <p class="text-sm text-orange-200 tracking-widest uppercase mb-1">Subject</p>
                <h1 class="font-bold text-2xl tracking-wider text-white">Philosophy of Artificial Intelligence</h1>
            </div>
            <!-- Empty div to balance flexbox space -->
            <div>
                <select id="theme-selector" class="bg-black/20 text-white backdrop-blur-md border border-white/10 rounded-lg px-2 py-1 text-xs outline-none cursor-pointer hover:bg-white/20 transition-all">
                    <option value="rose">Rose</option>
                    <option value="dark">Navy</option>
                    <option value="light">Light</option>
                    <option value="emerald">Emerald</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Mobile Subject Title -->
    <div class="md:hidden text-center mt-6 px-4">
        <h1 class="font-bold text-3xl tracking-wider text-white">Philosophy of Artificial Intelligence</h1>
    </div>

    <!-- Main Content Area: Level 2 - Languages -->
    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full flex flex-col items-center justify-center">
        
        <h2 class="text-2xl text-gray-200 mb-8 font-light">Select Language:</h2>

        <!-- Grid System: 1 col on mobile, 2 on tablet+ -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 w-full max-w-3xl">
            
            <!-- Language Card: Malayalam -->
            <a href="world-ml.html" class="block outline-none">
                <div class="glass-card rounded-2xl p-10 flex flex-col items-center justify-center text-center transition-transform duration-300 hover:scale-105 hover:shadow-[0_0_25px_rgba(251,113,133,0.5)]">
                    <span class="text-5xl mb-4">അ</span>
                    <h2 class="text-3xl font-bold text-white">Malayalam</h2>
                </div>
            </a>

            <!-- Language Card: English -->
            <a href="world-en.html" class="block outline-none">
                <div class="glass-card rounded-2xl p-10 flex flex-col items-center justify-center text-center transition-transform duration-300 hover:scale-105 hover:shadow-[0_0_25px_rgba(251,113,133,0.5)]">
                    <span class="text-5xl mb-4">A</span>
                    <h2 class="text-3xl font-bold text-white">English</h2>
                </div>
            </a>

        </div>
    </main>

    <!-- Footer -->
    <footer class="glass-card py-6 text-center text-gray-300 border-t-0 border-r-0 border-l-0 mt-auto">
        <p>&copy; 2026 Unofficial Notes Portal. Created by Hashim</p>
    </footer>

    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('preferred-theme') || 'rose';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>    <script>
        (function() {
            const selector = document.getElementById('theme-selector');
            const savedTheme = localStorage.getItem('preferred-theme') || 'rose';
            if (selector) {
                selector.value = savedTheme;
                selector.addEventListener('change', (e) => {
                    const theme = e.target.value;
                    document.documentElement.setAttribute('data-theme', theme);
                    localStorage.setItem('preferred-theme', theme);
                });
            }
        })();
    </script>
</body>
</html>
