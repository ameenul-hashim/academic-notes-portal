<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History of keralam upto 12th century - Languages</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Glassmorphism utility classes */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 min-h-screen text-white font-sans antialiased flex flex-col">

    <!-- Header Section -->
    <header class="glass-card sticky top-0 z-50 shadow-lg py-4 relative">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
            <!-- Back Button Navigation -->
            <a href="index.html" class="flex items-center text-pink-200 hover:text-white transition-colors">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back
            </a>
            <div class="absolute left-1/2 transform -translate-x-1/2 text-center hidden md:block">
                <p class="text-sm text-pink-200 tracking-widest uppercase mb-1">Subject</p>
                <h1 class="font-bold text-2xl tracking-wider text-white">history of keralam upto 12th century</h1>
            </div>
            <!-- Empty div to balance flexbox space -->
            <div class="w-20"></div>
        </div>
    </header>

    <!-- Mobile Subject Title -->
    <div class="md:hidden text-center mt-6 px-4">
        <h1 class="font-bold text-3xl tracking-wider text-white">History of keralam upto 12th century</h1>
    </div>

    <!-- Main Content Area: Level 2 - Languages -->
    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full flex flex-col items-center justify-center">
        
        <h2 class="text-2xl text-gray-200 mb-8 font-light">Select Language:</h2>

        <!-- Grid System: 1 col on mobile, 2 on tablet+ -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 w-full max-w-3xl">
            
            <!-- Language Card: Malayalam -->
            <a href="history-ml.html" class="block outline-none">
                <div class="glass-card rounded-2xl p-10 flex flex-col items-center justify-center text-center transition-transform duration-300 hover:scale-105 hover:shadow-[0_0_25px_rgba(236,72,153,0.5)]">
                    <span class="text-5xl mb-4">അ</span>
                    <h2 class="text-3xl font-bold text-white">Malayalam</h2>
                </div>
            </a>

            <!-- Language Card: English -->
            <a href="history-en.html" class="block outline-none">
                <div class="glass-card rounded-2xl p-10 flex flex-col items-center justify-center text-center transition-transform duration-300 hover:scale-105 hover:shadow-[0_0_25px_rgba(236,72,153,0.5)]">
                    <span class="text-5xl mb-4">A</span>
                    <h2 class="text-3xl font-bold text-white">English</h2>
                </div>
            </a>

        </div>
    </main>

    <!-- Footer -->
    <footer class="glass-card py-6 text-center text-gray-300 border-t-0 border-r-0 border-l-0 mt-auto">
        <p>&copy; 2026 Unofficial Notes Portal.</p>
    </footer>


    <!-- Firebase Presence -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAc1eNCmAYDRYbnRZPWj8NQ7dOWJY-4d0o",
            authDomain: "academic-portal-135fd.firebaseapp.com",
            projectId: "academic-portal-135fd",
            storageBucket: "academic-portal-135fd.firebasestorage.app",
            messagingSenderId: "459730360375",
            appId: "1:459730360375:web:151a615ff0bc30557347b2",
            databaseURL: "https://academic-portal-135fd-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const connectedRef = ref(db, '.info/connected');

        let userId = localStorage.getItem('portal-userId');
        if (!userId) {
            userId = 'u_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('portal-userId', userId);
        }

        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                const myPresenceRef = ref(db, `online_users/${userId}`);
                set(myPresenceRef, {
                    timestamp: serverTimestamp(),
                    name: localStorage.getItem('portal-username') || 'Anonymous'
                });
                onDisconnect(myPresenceRef).remove();
            }
        });
    </script>

</body>
</html>
